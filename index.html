<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debate Blitz Timer · Pangea Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue-900:#062a3a;
    --blue-800:#0a3f56;
    --blue-700:#0e5673;
    --blue-600:#127491;
    --blue-500:#1a8fae;
    --blue-100:#dff1f7;
    --white:#ffffff;
    --black:#0d1417;
    --ink:#0d1417;
    --yellow:#f4e11a;
    --yellow-dark:#c9b800;
    --danger:#e5484d;
    --radius-lg:24px;
    --radius-md:16px;
    --radius-sm:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:radial-gradient(circle at 20% 0%, var(--blue-700), var(--blue-900) 65%);
    font-family:'Inter',system-ui,sans-serif;
    color:var(--white);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 16px 60px;
  }

  .logo-footer{
    width:100%;
    max-width:980px;
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:48px;
    padding-top:32px;
    border-top:1px solid rgba(255,255,255,0.12);
  }
  .logo-footer-label{
    font-family:'Baloo 2',sans-serif;
    font-size:13px;
    font-weight:700;
    letter-spacing:1.6px;
    text-transform:uppercase;
    color:rgba(255,255,255,0.5);
    margin-bottom:20px;
  }
  .logo-grid{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
    gap:16px;
    width:100%;
  }
  .logo-card{
    background:var(--white);
    border-radius:16px;
    padding:14px 24px;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:60px;
    box-shadow:0 12px 24px -10px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
    transition:transform 0.18s ease, box-shadow 0.18s ease;
  }
  .logo-card:hover{
    transform:translateY(-3px);
    box-shadow:0 16px 30px -8px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
  }
  .logo-card img{
    height:36px;
    width:auto;
    max-width:150px;
    object-fit:contain;
    display:block;
  }
  .logo-plain{
    height:36px;
    width:auto;
    object-fit:contain;
    display:block;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:6px;
  }
  .brand-logo{
    height:14px;
    width:auto;
    display:block;
  }
  .brand-dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--yellow);
    box-shadow:0 0 0 3px rgba(244,225,26,0.18);
  }
  .brand-name{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:0.5px;
    color:var(--white);
    text-transform:uppercase;
  }
  h1{
    font-family:'Baloo 2',sans-serif;
    font-weight:800;
    font-size:clamp(26px,5vw,38px);
    margin:4px 0 4px;
    text-align:center;
    letter-spacing:0.5px;
  }
  .title-logo{
    display:block;
    height:clamp(38px,6vw,56px);
    width:auto;
    margin:8px auto 4px;
  }
  .subtitle{
    color:rgba(255,255,255,0.65);
    font-size:14px;
    margin-bottom:22px;
    text-align:center;
    max-width:480px;
    font-weight:600;
    letter-spacing:0.3px;
  }

  .motion-card{
    width:100%;
    max-width:880px;
    background:linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.04));
    border:1px solid rgba(244,225,26,0.25);
    border-radius:var(--radius-lg);
    padding:32px 36px;
    margin-bottom:26px;
    text-align:center;
    backdrop-filter:blur(6px);
    box-shadow:0 20px 45px -18px rgba(0,0,0,0.55);
  }
  .motion-label{
    font-family:'Baloo 2',sans-serif;
    font-size:13px;
    font-weight:700;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--yellow);
    margin-bottom:14px;
  }
  #motionText{
    font-family:'Baloo 2',sans-serif;
    font-weight:800;
    font-size:clamp(24px,4.2vw,36px);
    line-height:1.3;
    color:var(--white);
    text-align:center;
    outline:none;
    border:none;
    background:transparent;
    border-radius:12px;
    padding:8px 12px;
    max-width:100%;
    text-shadow:0 4px 18px rgba(0,0,0,0.45);
    transition:background 0.15s ease;
  }
  #motionText:hover{background:rgba(255,255,255,0.06);}
  #motionText:focus{background:rgba(255,255,255,0.1);box-shadow:0 0 0 2px rgba(244,225,26,0.4);}
  .motion-hint{
    margin-top:12px;
    font-size:11px;
    color:rgba(255,255,255,0.4);
    font-weight:600;
    letter-spacing:0.3px;
  }

  .setup-bar{
    width:100%;
    max-width:920px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:var(--radius-md);
    padding:16px 20px;
    display:flex;
    flex-wrap:wrap;
    gap:18px;
    align-items:center;
    justify-content:space-between;
    margin-bottom:24px;
    backdrop-filter:blur(6px);
  }
  .setup-group{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .setup-group label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.8px;
    color:rgba(255,255,255,0.55);
    font-weight:600;
  }
  .setup-group .row{
    display:flex;
    align-items:center;
    gap:8px;
  }
  input[type="number"]{
    width:64px;
    padding:8px 10px;
    border-radius:var(--radius-sm);
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.08);
    color:var(--white);
    font-size:15px;
    font-weight:600;
    font-family:'Inter',sans-serif;
  }
  input[type="number"]::-webkit-inner-spin-button{opacity:0.6;}
  #secondsInput{width:52px;}
  .setup-group .row .sep{
    color:rgba(255,255,255,0.5);
    font-weight:700;
    font-size:15px;
  }
  select{
    padding:8px 12px;
    border-radius:var(--radius-sm);
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.08);
    color:var(--white);
    font-size:14px;
    font-weight:600;
    font-family:'Inter',sans-serif;
  }
  select option{
    color:var(--black);
    background:var(--white);
  }
  .name-input{
    padding:8px 10px;
    border-radius:var(--radius-sm);
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.08);
    color:var(--white);
    font-size:14px;
    font-weight:600;
    width:130px;
    font-family:'Inter',sans-serif;
  }

  .clocks{
    display:flex;
    gap:16px;
    width:100%;
    max-width:920px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .panel{
    flex:1 1 380px;
    min-height:280px;
    border-radius:var(--radius-lg);
    background:var(--white);
    color:var(--black);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:28px 20px;
    cursor:pointer;
    user-select:none;
    border:3px solid transparent;
    transition:transform 0.12s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    position:relative;
    overflow:hidden;
  }
  .panel:active{transform:scale(0.985);}
  .panel .side-label{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--blue-600);
    margin-bottom:10px;
  }
  .panel .time{
    font-family:'Baloo 2',sans-serif;
    font-weight:800;
    font-size:clamp(56px,10vw,88px);
    line-height:1;
    letter-spacing:1px;
    font-variant-numeric:tabular-nums;
  }
  .panel .hint{
    margin-top:14px;
    font-size:12px;
    color:rgba(13,20,23,0.45);
    font-weight:600;
    letter-spacing:0.3px;
  }
  .panel.selected{
    border-color:var(--yellow);
    box-shadow:0 0 0 5px rgba(244,225,26,0.12);
  }
  .panel.active{
    background:var(--blue-500);
    color:var(--white);
    border-color:var(--yellow);
    box-shadow:0 0 0 6px rgba(244,225,26,0.14), 0 20px 40px -12px rgba(6,42,58,0.55);
  }
  .panel.active .side-label{color:rgba(255,255,255,0.85);}
  .panel.active .hint{color:rgba(255,255,255,0.75);}
  .panel.low-time .time{color:var(--danger);}
  .panel.active.low-time{background:#7a1e21;border-color:var(--danger);}
  .panel.active.low-time .time{color:var(--white);}
  .panel.expired{
    background:var(--danger);
    color:var(--white);
    border-color:var(--white);
    cursor:not-allowed;
  }
  .panel.expired .side-label,.panel.expired .hint{color:rgba(255,255,255,0.9);}
  .panel.expired.ringing{
    cursor:pointer;
    animation:alarmPulse 0.75s ease-in-out infinite;
  }
  @keyframes alarmPulse{
    0%{box-shadow:0 0 0 0 rgba(229,72,77,0.65);}
    70%{box-shadow:0 0 0 22px rgba(229,72,77,0);}
    100%{box-shadow:0 0 0 0 rgba(229,72,77,0);}
  }
  .panel .dismiss-hint{
    display:inline-block;
    margin-top:6px;
    padding:4px 12px;
    border-radius:999px;
    background:rgba(255,255,255,0.22);
    font-size:11px;
    font-weight:700;
    letter-spacing:0.4px;
    text-transform:uppercase;
  }

  .controls{
    display:flex;
    gap:12px;
    margin-top:28px;
    flex-wrap:wrap;
    justify-content:center;
  }
  button.ctl{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:0.3px;
    padding:13px 26px;
    border-radius:999px;
    border:2px solid rgba(255,255,255,0.25);
    background:rgba(255,255,255,0.08);
    color:var(--white);
    cursor:pointer;
    transition:all 0.15s ease;
  }
  button.ctl:hover{background:rgba(255,255,255,0.16);}
  button.ctl:active{transform:scale(0.96);}
  button.ctl:disabled{opacity:0.4;cursor:not-allowed;}
  button.ctl.primary{
    background:var(--yellow);
    color:var(--blue-900);
    border-color:var(--yellow);
  }
  button.ctl.primary:hover{background:#fff04d;}
  button.ctl.danger{
    border-color:rgba(229,72,77,0.5);
    color:#ff9a9d;
  }
  button.ctl.danger:hover{background:rgba(229,72,77,0.15);}

  .status-row{
    margin-top:18px;
    font-size:13px;
    color:rgba(255,255,255,0.55);
    text-align:center;
    min-height:18px;
    font-weight:600;
  }

  @media (max-width:640px){
    .clocks{flex-direction:column;}
    .panel{min-height:220px;}
    .setup-bar{flex-direction:column;align-items:stretch;}
    .setup-group{width:100%;}
    .logo-card{padding:10px 16px;}
    .logo-card img{height:28px;}
    .logo-plain{height:28px;}
  }
</style>
</head>

<div class="motion-card">
  <div class="motion-label">Moción</div>
  <div id="motionText" contenteditable="true" spellcheck="false">¿Está la juventud dominicana representada en la agenda cultural y de identidad nacional?</div>
  <div class="motion-hint">Toca el texto para escribir o cambiar la moción</div>
</div>

<div class="setup-bar">
  <div class="setup-group">
    <label>Equipo A</label>
    <div class="row">
      <input class="name-input" id="nameA" type="text" value="Afirmativo" maxlength="18">
    </div>
  </div>
  <div class="setup-group">
    <label>Equipo B</label>
    <div class="row">
      <input class="name-input" id="nameB" type="text" value="Negativo" maxlength="18">
    </div>
  </div>
  <div class="setup-group">
    <label>Minutos por turno</label>
    <div class="row">
      <input id="minutesInput" type="number" min="0" max="60" value="5">
      <span class="sep">:</span>
      <input id="secondsInput" type="number" min="0" max="59" value="0" title="Segundos">
    </div>
  </div>
  <div class="setup-group">
    <label>Formato</label>
    <div class="row">
      <select id="presetSelect">
        <option value="custom">Personalizado</option>
        <option value="4">Rápido · 4 min</option>
        <option value="5">Estándar · 5 min</option>
        <option value="8">Extendido · 8 min</option>
      </select>
    </div>
  </div>
</div>

<div class="clocks">
  <div class="panel" id="panelA">
    <div class="side-label" id="labelA">Afirmativo</div>
    <div class="time" id="timeA">05:00</div>
    <div class="hint" id="hintA">Toca para seleccionar</div>
  </div>
  <div class="panel" id="panelB">
    <div class="side-label" id="labelB">Negativo</div>
    <div class="time" id="timeB">05:00</div>
    <div class="hint" id="hintB">Toca para seleccionar</div>
  </div>
</div>

<div class="controls">
  <button class="ctl primary" id="startPauseBtn" disabled>Iniciar</button>
  <button class="ctl" id="switchBtn">Cambiar turno</button>
  <button class="ctl danger" id="resetBtn">Reiniciar</button>
</div>

<div class="status-row" id="statusRow">Selecciona el equipo que tomará la palabra</div>

<script>
(function(){
  var state = {
    minutes: 5,
    increment: 0,
    timeA: 5*60,
    timeB: 5*60,
    active: null,      // 'A' | 'B' | null -> equipo seleccionado por el moderador
    running: false,    // si el reloj del equipo activo está corriendo
    expiredSide: null,
    alarmSide: null
  };

  var els = {
    panelA: document.getElementById('panelA'),
    panelB: document.getElementById('panelB'),
    timeA: document.getElementById('timeA'),
    timeB: document.getElementById('timeB'),
    hintA: document.getElementById('hintA'),
    hintB: document.getElementById('hintB'),
    labelA: document.getElementById('labelA'),
    labelB: document.getElementById('labelB'),
    nameA: document.getElementById('nameA'),
    nameB: document.getElementById('nameB'),
    minutesInput: document.getElementById('minutesInput'),
    secondsInput: document.getElementById('secondsInput'),
    presetSelect: document.getElementById('presetSelect'),
    startPauseBtn: document.getElementById('startPauseBtn'),
    switchBtn: document.getElementById('switchBtn'),
    resetBtn: document.getElementById('resetBtn'),
    statusRow: document.getElementById('statusRow'),
    motionText: document.getElementById('motionText')
  };

  var tickHandle = null;
  var audioCtx = null;
  var alarmHandle = null;

  function playAlarmPulse(){
    try{
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      var t0 = audioCtx.currentTime;
      [0, 0.22].forEach(function(offset){
        var o = audioCtx.createOscillator();
        var g = audioCtx.createGain();
        o.type = 'square';
        o.frequency.setValueAtTime(880, t0+offset);
        g.gain.setValueAtTime(0.0001, t0+offset);
        g.gain.exponentialRampToValueAtTime(0.25, t0+offset+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t0+offset+0.2);
        o.connect(g);
        g.connect(audioCtx.destination);
        o.start(t0+offset);
        o.stop(t0+offset+0.22);
      });
    }catch(e){}
  }

  function startAlarm(side){
    state.alarmSide = side;
    playAlarmPulse();
    if(alarmHandle) clearInterval(alarmHandle);
    alarmHandle = setInterval(playAlarmPulse, 750);
    render();
  }

  function stopAlarm(){
    state.alarmSide = null;
    if(alarmHandle){ clearInterval(alarmHandle); alarmHandle=null; }
    render();
  }

  function fmt(sec){
    sec = Math.max(0, Math.round(sec));
    var m = Math.floor(sec/60);
    var s = sec%60;
    return (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  }

  function applyBaseTimes(resetOnly){
    var mins = parseFloat(els.minutesInput.value);
    if(isNaN(mins) || mins<0) mins = 0;
    var secs = parseFloat(els.secondsInput.value);
    if(isNaN(secs) || secs<0) secs = 0;
    var total = mins*60 + secs;
    if(total<=0) total = 60; // evita un cronómetro en 00:00 por error de captura
    state.minutes = mins;
    if(resetOnly !== false){
      state.timeA = total;
      state.timeB = total;
    }
  }

  function render(){
    els.timeA.textContent = fmt(state.timeA);
    els.timeB.textContent = fmt(state.timeB);
    els.labelA.textContent = els.nameA.value || 'Equipo A';
    els.labelB.textContent = els.nameB.value || 'Equipo B';

    [['A',els.panelA,els.hintA,state.timeA],['B',els.panelB,els.hintB,state.timeB]].forEach(function(entry){
      var side=entry[0], panel=entry[1], hint=entry[2], t=entry[3];
      var isSelected = state.active===side;
      var isRunning = isSelected && state.running;
      var isRinging = state.alarmSide===side;
      panel.classList.toggle('active', isRunning);
      panel.classList.toggle('selected', isSelected && !isRunning && t>0);
      panel.classList.toggle('low-time', t>0 && t<=30);
      panel.classList.toggle('expired', t<=0);
      panel.classList.toggle('ringing', isRinging);

      if(isRinging){
        hint.innerHTML = 'Tiempo agotado<br><span class="dismiss-hint">Pulsa para apagar</span>';
      } else if(t<=0){
        hint.textContent = 'Tiempo agotado';
      } else if(isRunning){
        hint.textContent = 'Hablando ahora';
      } else if(isSelected){
        hint.textContent = 'Listo — presiona Iniciar';
      } else {
        hint.textContent = 'Toca para seleccionar';
      }
    });

    els.startPauseBtn.disabled = !state.active || (state.active==='A' ? state.timeA<=0 : state.timeB<=0);
    els.startPauseBtn.textContent = state.running ? 'Pausar' : 'Iniciar';
  }

  function stopTick(){
    if(tickHandle){ clearInterval(tickHandle); tickHandle=null; }
  }

  function startTick(){
    stopTick();
    var last = Date.now();
    tickHandle = setInterval(function(){
      var now = Date.now();
      var delta = (now-last)/1000;
      last = now;
      if(!state.active || !state.running) return;
      if(state.active==='A'){
        state.timeA = Math.max(0, state.timeA - delta);
        if(state.timeA<=0 && state.expiredSide!=='A'){
          state.expiredSide='A'; state.running=false; stopTick();
          startAlarm('A');
          els.statusRow.textContent = 'Tiempo de ' + (els.nameA.value||'Equipo A') + ' agotado. Pulsa el panel para apagar la alarma.';
        }
      } else {
        state.timeB = Math.max(0, state.timeB - delta);
        if(state.timeB<=0 && state.expiredSide!=='B'){
          state.expiredSide='B'; state.running=false; stopTick();
          startAlarm('B');
          els.statusRow.textContent = 'Tiempo de ' + (els.nameB.value||'Equipo B') + ' agotado. Pulsa el panel para apagar la alarma.';
        }
      }
      render();
    }, 100);
  }

  // Selecciona un equipo SIN iniciar su reloj. El moderador ("el que está en la mesa")
  // debe presionar "Iniciar" para que el tiempo empiece a correr. Esto permite pausas
  // reales entre turnos y evita que un equipo arranque automáticamente al terminar el otro.
  function selectSide(side){
    var t = side==='A' ? state.timeA : state.timeB;
    if(t<=0) return; // no se puede seleccionar un equipo sin tiempo

    // si el otro equipo estaba corriendo, se pausa al cambiar de selección
    if(state.active && state.active!==side && state.running){
      pauseActive();
    }

    state.active = side;
    state.running = false;
    els.statusRow.textContent = (side==='A' ? (els.nameA.value||'Equipo A') : (els.nameB.value||'Equipo B')) + ' seleccionado. Presiona Iniciar cuando esté listo.';
    render();
  }

  function pauseActive(){
    state.running = false;
    stopTick();
  }

  function startActive(){
    if(!state.active) return;
    var t = state.active==='A' ? state.timeA : state.timeB;
    if(t<=0) return;
    state.running = true;
    els.statusRow.textContent = 'Turno de ' + (state.active==='A' ? (els.nameA.value||'Equipo A') : (els.nameB.value||'Equipo B'));
    startTick();
    render();
  }

  els.panelA.addEventListener('click', function(){
    if(state.timeA<=0){
      if(state.alarmSide==='A') stopAlarm();
      return;
    }
    selectSide('A');
  });
  els.panelB.addEventListener('click', function(){
    if(state.timeB<=0){
      if(state.alarmSide==='B') stopAlarm();
      return;
    }
    selectSide('B');
  });

  els.startPauseBtn.addEventListener('click', function(){
    if(!state.active) return;
    if(state.running){
      pauseActive();
      els.statusRow.textContent = 'Pausado';
    } else {
      startActive();
    }
    render();
  });

  els.switchBtn.addEventListener('click', function(){
    if(state.active && state.running){ pauseActive(); }
    var next = state.active==='A' ? 'B' : (state.active==='B' ? 'A' : 'A');
    selectSide(next);
  });

  els.resetBtn.addEventListener('click', function(){
    stopTick();
    if(alarmHandle){ clearInterval(alarmHandle); alarmHandle=null; }
    state.active = null;
    state.running = false;
    state.expiredSide = null;
    state.alarmSide = null;
    applyBaseTimes(true);
    els.statusRow.textContent = 'Selecciona el equipo que tomará la palabra';
    render();
  });

  els.minutesInput.addEventListener('input', function(){
    els.presetSelect.value = 'custom';
    if(!state.running){
      state.active = null;
      if(alarmHandle){ clearInterval(alarmHandle); alarmHandle=null; state.alarmSide=null; }
      applyBaseTimes(true);
      els.statusRow.textContent = 'Selecciona el equipo que tomará la palabra';
      render();
    }
  });
  els.secondsInput.addEventListener('input', function(){
    els.presetSelect.value = 'custom';
    if(!state.running){
      state.active = null;
      if(alarmHandle){ clearInterval(alarmHandle); alarmHandle=null; state.alarmSide=null; }
      applyBaseTimes(true);
      els.statusRow.textContent = 'Selecciona el equipo que tomará la palabra';
      render();
    }
  });

  els.presetSelect.addEventListener('change', function(){
    var v = els.presetSelect.value;
    if(v!=='custom'){
      els.minutesInput.value = v;
      els.secondsInput.value = 0;
      if(!state.running){
        state.active = null;
        if(alarmHandle){ clearInterval(alarmHandle); alarmHandle=null; state.alarmSide=null; }
        applyBaseTimes(true);
        els.statusRow.textContent = 'Selecciona el equipo que tomará la palabra';
        render();
      }
    }
  });

  els.nameA.addEventListener('input', render);
  els.nameB.addEventListener('input', render);

  els.motionText.addEventListener('keydown', function(e){
    if(e.key==='Enter'){ e.preventDefault(); els.motionText.blur(); }
  });

  applyBaseTimes(true);
  render();
})();
</script>
